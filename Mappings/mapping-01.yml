AWSTemplateFormatVersion: 2010-09-09

Parameters:
  MyKeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Select the key name
    
Mappings:
  MyRegionMap:
    us-east-2:
      HVM64: ami-05d72852800cbf29e
    us-east-1:
      HVM64: ami-0577b787189839998

Resources:
  MyVMInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap
        - MyRegionMap
        - !Ref 'AWS::Region'
        - HVM64
      InstanceType: t2.micro
      KeyName:
        Ref: MyKeyName