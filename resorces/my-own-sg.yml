AWSTemplateFormatVersion: 2010-09-09
Description: Creating AWS EC2 Instance

Resources:
  DemoEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-05d72852800cbf29e
      InstanceType: t2.micro
      KeyName: cfn-key-1
      SecurityGroups:
      - default
      - Ref: SSHSecurityGroup
  SSHSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: SSH SG
      SecurityGroupIngress:
        - IpProtocol: 'tcp'
          FromPort: '22'
          ToPort: '22'
          CidrIp: '0.0.0.0/0'
        - IpProtocol: 'tcp'
          FromPort: '80'
          ToPort: '80'
          CidrIp: '0.0.0.0/0'
        - IpProtocol: 'tcp'
          FromPort: '8081'
          ToPort: '8081'
          CidrIp: '0.0.0.0/0'
        
  ElasticIp:
    Type: AWS::EC2::EIP
    Properties:
      InstanceId:
        Ref: DemoEC2Instance
      

